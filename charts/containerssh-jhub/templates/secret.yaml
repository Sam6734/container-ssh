{{- if .Values.secret.create }}
{{- /*
  Resolve the JupyterHub API token and SSH host key:
  1. explicit value from .Values.secret.*, else
  2. the value already stored in the existing secret (so upgrades never
     rotate credentials), else
  3. freshly generated.
  The secrets are annotated "helm.sh/resource-policy": keep so generated
  credentials survive helm uninstall and secret.create being switched off.
*/}}
{{- $tokenName := .Values.jupyterhub.adminTokenSecret.name }}
{{- $tokenKey := .Values.jupyterhub.adminTokenSecret.key }}
{{- $hostKeyName := .Values.ssh.hostKeySecret.name }}
{{- $hostKeyKey := .Values.ssh.hostKeySecret.key }}
{{- $adminToken := .Values.secret.jupyterhubAdminToken }}
{{- if not $adminToken }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $tokenName }}
  {{- if and $existing (hasKey ($existing.data | default dict) $tokenKey) }}
    {{- $adminToken = index $existing.data $tokenKey | b64dec }}
  {{- else }}
    {{- $adminToken = randAlphaNum 64 }}
  {{- end }}
{{- end }}
{{- $hostKey := .Values.secret.sshHostKey }}
{{- if not $hostKey }}
  {{- $existing := lookup "v1" "Secret" .Release.Namespace $hostKeyName }}
  {{- if and $existing (hasKey ($existing.data | default dict) $hostKeyKey) }}
    {{- $hostKey = index $existing.data $hostKeyKey | b64dec }}
  {{- else }}
    {{- $hostKey = genPrivateKey "rsa" }}
  {{- end }}
{{- end }}
{{- if eq $tokenName $hostKeyName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $hostKeyName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "containerssh-jhub.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    {{- with .Values.secret.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  {{ $tokenKey }}: {{ $adminToken | quote }}
  {{ $hostKeyKey }}: |-
{{ $hostKey | indent 4 }}
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tokenName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "containerssh-jhub.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    {{- with .Values.secret.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  {{ $tokenKey }}: {{ $adminToken | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $hostKeyName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "containerssh-jhub.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    {{- with .Values.secret.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
stringData:
  {{ $hostKeyKey }}: |-
{{ $hostKey | indent 4 }}
{{- end }}
{{- end }}
