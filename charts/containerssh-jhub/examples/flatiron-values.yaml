# Example values for a Flatiron/coffea-casa style install.
#
# This file intentionally does not contain secrets. Create the referenced
# secret before installing the chart:
#
#   kubectl create secret generic containerssh \
#     --from-file=host-key=host-key \
#     --from-literal=jhub-admin-token=<jupyterhub-admin-token> \
#     -n <namespace>
#
# Install example:
#
#   helm upgrade --install containerssh ./charts/containerssh-jhub \
#     -n <namespace> \
#     -f charts/containerssh-jhub/examples/flatiron-values.yaml

jupyterhub:
  # Hub API URL from inside the cluster. If ContainerSSH is installed in the
  # JupyterHub namespace, the short service name is usually enough.
  url: "http://hub:8081"
  adminTokenSecret:
    name: containerssh
    key: jhub-admin-token
  # Leave empty when user pods run in the Helm release namespace.
  userNamespace: ""

service:
  type: LoadBalancer
  port: 2222
  annotations:
    # Replace with the Flatiron SSH hostname managed by ExternalDNS.
    external-dns.alpha.kubernetes.io/hostname: ssh.flatiron.example.org
  # Set this if MetalLB should assign a specific address.
  loadBalancerIP: ""

ssh:
  hostKeySecret:
    name: containerssh
    key: host-key
  banner:
    title: "Coffea-Casa SSH Gateway"
    usernameExample: "firstname-last-institution-edu"
    # Replace with the public Flatiron JupyterHub URL.
    tokenUrl: "https://hub.flatiron.example.org/hub/token"

secret:
  create: false

tokens:
  maxAgeDays: 7
  cleanup:
    enabled: true
    schedule: "0 2 * * *"
    dryRun: false

launcher:
  podName: containerssh-launcher

image:
  auth:
    repository: ghcr.io/sam6734/containerssh-auth
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  config:
    repository: ghcr.io/sam6734/containerssh-config
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  launcher:
    repository: ghcr.io/sam6734/containerssh-launcher
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  containerssh:
    repository: containerssh/containerssh
    tag: "v0.6"
    pullPolicy: IfNotPresent

rbac:
  create: true
  serviceAccountName: containerssh
