jupyterhub:
  url: "http://hub.cmsaf-dev.svc.cluster.local:8081"
  adminTokenSecret:
    name: containerssh
    key: jhub-admin-token
  userNamespace: "cmsaf-dev"

service:
  type: LoadBalancer
  port: 2222
  annotations:
    external-dns.alpha.kubernetes.io/hostname: ssh.cmsaf-dev.flatiron.hollandhpc.org
  loadBalancerIP: "129.93.179.28"

ssh:
  hostKeySecret:
    name: containerssh
    key: host-key
  banner:
    title: "Coffea Casa SSH Gateway  (cmsaf-dev)"
    usernameExample: "firstname-last-unl-edu"
    tokenUrl: "https://hub.cmsaf-dev.flatiron.hollandhpc.org/hub/token"

# The chart manages the secret: the API token was auto-generated on install
# and is preserved across upgrades. The same token is registered as the
# `containerssh` JupyterHub service in the z2jh values (coffea-casa-config),
# and the secret itself is committed there as a SealedSecret.
secret:
  create: true

tokens:
  maxAgeDays: 7
  cleanup:
    enabled: true
    schedule: "0 2 * * *"
    dryRun: false

launcher:
  podName: containerssh-launcher

image:
  auth:
    repository: ghcr.io/sam6734/containerssh-auth
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  config:
    repository: ghcr.io/sam6734/containerssh-config
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  launcher:
    repository: ghcr.io/sam6734/containerssh-launcher
    tag: "0.2.0"
    pullPolicy: IfNotPresent
  containerssh:
    repository: containerssh/containerssh
    tag: "v0.6"
    pullPolicy: IfNotPresent

rbac:
  create: true
  serviceAccountName: containerssh
